name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Verify lockfile integrity
        run: uv lock --check

      - name: Install dependencies (hash-verified)
        run: uv sync --frozen --extra dev

      - name: Dependency audit (pip-audit)
        run: uv run pip-audit

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy imap_mcp/

      - name: Security scan (bandit)
        run: uv run bandit -r imap_mcp/ -c pyproject.toml

      - name: Run tests
        run: uv run pytest --skip-integration --cov=imap_mcp --cov-fail-under=80

  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t imap-mcp:ci .

      - name: Scan Docker image (Trivy)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: imap-mcp:ci
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
